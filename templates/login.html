<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - LPR Dashboard</title>
    <style>
        :root {
            --bg: #0b1220;
            --card: #111827;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --primary: #22c55e;
            --danger: #ef4444;
            --border: #1f2937;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top right, #1e293b, var(--bg) 45%);
            color: var(--text);
            font-family: "Segoe UI", Arial, sans-serif;
        }
        .card {
            width: min(460px, 92vw);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }
        h1 {
            margin: 0 0 0.35rem;
            font-size: 1.3rem;
        }
        p {
            margin: 0 0 1rem;
            color: var(--muted);
            font-size: 0.92rem;
        }
        label {
            display: block;
            margin-bottom: 0.35rem;
            font-size: 0.9rem;
            font-weight: 600;
        }
        input {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #020617;
            color: var(--text);
            padding: 0.62rem 0.7rem;
            margin-bottom: 0.8rem;
            font-size: 0.94rem;
        }
        button {
            width: 100%;
            border: 0;
            border-radius: 8px;
            padding: 0.66rem 0.8rem;
            cursor: pointer;
            background: var(--primary);
            color: #052e16;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .error {
            margin-bottom: 0.8rem;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 8px;
            color: #fecaca;
            padding: 0.55rem 0.7rem;
            font-size: 0.9rem;
        }
        .hint {
            margin-top: 0.8rem;
            color: #94a3b8;
            font-size: 0.82rem;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>LPR Dashboard Login</h1>
        <p>Sign in to access live feeds, detections, and controls.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('login', next=request.args.get('next', '')) }}">
            <label for="credential">Username / Email</label>
            <input id="credential" name="credential" type="text" required autofocus>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>

            <button type="submit">Login</button>
        </form>

        <div class="hint">Default admin: admin@campus.local / changeme123 (first run only)</div>
    </main>
</body>
</html>
