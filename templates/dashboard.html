<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPR System — Dashboard</title>
    <style>
        /* ====== Reset & Base ====== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
        }
        a { color: #60a5fa; text-decoration: none; }

        /* ====== Header ====== */
        header {
            background: linear-gradient(135deg, #1a1d2e 0%, #252a3a 100%);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2d3348;
            box-shadow: 0 2px 12px rgba(0,0,0,.4);
        }
        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header .status {
            display: flex; gap: .7rem; align-items: center;
            font-size: .85rem; color: #94a3b8;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #22c55e; display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }

        /* ====== Layout ====== */
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

        /* ====== Stat cards ====== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: #1a1d2e;
            border: 1px solid #2d3348;
            border-radius: 12px;
            padding: 1.2rem;
            text-align: center;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #60a5fa;
        }
        .stat-card .label {
            font-size: .8rem;
            color: #94a3b8;
            margin-top: .3rem;
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        .stat-card.entrance .value { color: #22c55e; }
        .stat-card.exit .value     { color: #f97316; }
        .stat-card.today .value    { color: #a78bfa; }

        /* ====== Camera Device Selector ====== */
        .device-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 768px) {
            .device-selector { grid-template-columns: 1fr; }
        }
        .device-card {
            background: #1a1d2e;
            border: 1px solid #2d3348;
            border-radius: 12px;
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            gap: .8rem;
            flex-wrap: wrap;
        }
        .device-card label {
            font-size: .85rem;
            font-weight: 600;
            color: #94a3b8;
            white-space: nowrap;
        }
        .device-card select {
            flex: 1;
            min-width: 160px;
            background: #252a3a;
            border: 1px solid #2d3348;
            border-radius: 8px;
            color: #e2e8f0;
            padding: .45rem .7rem;
            font-size: .85rem;
            cursor: pointer;
        }
        .device-card select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .device-card button {
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: .5rem 1rem;
            cursor: pointer;
            font-size: .82rem;
            font-weight: 600;
            transition: background .2s;
            white-space: nowrap;
        }
        .device-card .btn-start {
            background: #22c55e;
        }
        .device-card .btn-start:hover { background: #16a34a; }
        .device-card .btn-stop {
            background: #ef4444;
        }
        .device-card .btn-stop:hover { background: #dc2626; }
        .device-card .btn-refresh {
            background: #6366f1;
        }
        .device-card .btn-refresh:hover { background: #4f46e5; }
        .device-card button:disabled {
            background: #374151;
            cursor: not-allowed;
        }
        .device-card .assign-status {
            font-size: .78rem;
            margin-left: auto;
        }
        .assign-ok   { color: #22c55e; }
        .assign-fail { color: #ef4444; }

        /* ====== Camera feeds ====== */
        .cameras {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .cam-box {
            background: #1a1d2e;
            border: 1px solid #2d3348;
            border-radius: 12px;
            overflow: hidden;
        }
        .cam-box .cam-header {
            padding: .7rem 1rem;
            font-weight: 600;
            font-size: .9rem;
            border-bottom: 1px solid #2d3348;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .cam-box .cam-header .dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        }
        .cam-box .cam-header .dot.entrance { background: #22c55e; }
        .cam-box .cam-header .dot.exit     { background: #f97316; }
        .cam-box img {
            width: 100%;
            display: block;
            background: #000;
            min-height: 240px;
            object-fit: contain;
        }
        @media (max-width: 768px) {
            .cameras { grid-template-columns: 1fr; }
        }

        /* ====== Filter bar ====== */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: .8rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .filter-bar label {
            font-size: .85rem;
            color: #94a3b8;
        }
        .filter-bar input[type="date"] {
            background: #1a1d2e;
            border: 1px solid #2d3348;
            border-radius: 8px;
            color: #e2e8f0;
            padding: .45rem .7rem;
            font-size: .85rem;
        }
        .filter-bar button {
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: .5rem 1.2rem;
            cursor: pointer;
            font-size: .85rem;
            font-weight: 600;
            transition: background .2s;
        }
        .filter-bar button:hover { background: #2563eb; }
        .filter-bar .btn-clear {
            background: #374151;
        }
        .filter-bar .btn-clear:hover { background: #4b5563; }

        /* ====== Table ====== */
        .table-wrapper {
            background: #1a1d2e;
            border: 1px solid #2d3348;
            border-radius: 12px;
            overflow: hidden;
        }
        .table-wrapper h2 {
            padding: 1rem 1.2rem .5rem;
            font-size: 1rem;
            font-weight: 600;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            background: #252a3a;
            text-align: left;
            padding: .65rem 1rem;
            font-size: .78rem;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: #94a3b8;
            border-bottom: 1px solid #2d3348;
        }
        tbody tr {
            border-bottom: 1px solid #1e2235;
            transition: background .15s;
        }
        tbody tr:hover { background: #252a3a; }
        tbody td {
            padding: .6rem 1rem;
            font-size: .85rem;
            vertical-align: middle;
        }
        .badge {
            display: inline-block;
            padding: .15rem .6rem;
            border-radius: 9999px;
            font-size: .75rem;
            font-weight: 600;
        }
        .badge.entrance { background: rgba(34,197,94,.15); color: #22c55e; }
        .badge.exit     { background: rgba(249,115,22,.15); color: #f97316; }
        .thumb {
            width: 64px;
            height: 44px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #2d3348;
            cursor: pointer;
            transition: transform .2s;
        }
        .thumb:hover { transform: scale(2.5); z-index: 10; position: relative; }
        .no-thumb {
            display: inline-block;
            width: 64px;
            text-align: center;
            color: #64748b;
            font-size: .75rem;
        }
        .confidence {
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }
        .no-data {
            text-align: center;
            padding: 2rem;
            color: #64748b;
        }

        /* ====== Footer ====== */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: .75rem;
            color: #475569;
        }

        /* ====== Scrollbar ====== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f1117; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body>

<!-- ====== Header ====== -->
<header>
    <h1>&#128663; LPR System — License Plate Recognition</h1>
    <div class="status">
        <span class="status-dot"></span>
        System Active
    </div>
</header>

<div class="container">

    <!-- ====== Stats ====== -->
    <div class="stats-row" id="stats-row">
        <div class="stat-card">
            <div class="value" id="stat-total">—</div>
            <div class="label">Total Detections</div>
        </div>
        <div class="stat-card today">
            <div class="value" id="stat-today">—</div>
            <div class="label">Today</div>
        </div>
        <div class="stat-card entrance">
            <div class="value" id="stat-entrance">—</div>
            <div class="label">Entrance</div>
        </div>
        <div class="stat-card exit">
            <div class="value" id="stat-exit">—</div>
            <div class="label">Exit</div>
        </div>
    </div>

    <!-- ====== Camera Device Selection ====== -->
    <div class="device-selector" id="device-selector">
        <div class="device-card">
            <label>&#127909; Entrance Camera:</label>
            <select id="dev-entrance"><option value="">— scan for devices —</option></select>
            <button class="btn-start" onclick="assignDevice('entrance')">Start</button>
            <button class="btn-stop" onclick="stopDevice('entrance')">Stop</button>
            <span class="assign-status" id="status-entrance"></span>
        </div>
        <div class="device-card">
            <label>&#127909; Exit Camera:</label>
            <select id="dev-exit"><option value="">— scan for devices —</option></select>
            <button class="btn-start" onclick="assignDevice('exit')">Start</button>
            <button class="btn-stop" onclick="stopDevice('exit')">Stop</button>
            <span class="assign-status" id="status-exit"></span>
        </div>
        <div class="device-card" style="grid-column: 1 / -1; justify-content: center;">
            <button class="btn-refresh" onclick="scanDevices()">&#128269; Scan for Cameras</button>
            <span class="assign-status" id="status-scan"></span>
        </div>
    </div>

    <!-- ====== Live Camera Feeds ====== -->
    <div class="cameras">
        <div class="cam-box">
            <div class="cam-header"><span class="dot entrance"></span>Entrance Camera</div>
            <img src="/video/entrance" alt="Entrance Camera Feed">
        </div>
        <div class="cam-box">
            <div class="cam-header"><span class="dot exit"></span>Exit Camera</div>
            <img src="/video/exit" alt="Exit Camera Feed">
        </div>
    </div>

    <!-- ====== Filter + Table ====== -->
    <div class="filter-bar">
        <label for="date-filter">Filter by date:</label>
        <input type="date" id="date-filter">
        <button onclick="applyFilter()">Filter</button>
        <button class="btn-clear" onclick="clearFilter()">Show All</button>
    </div>

    <div class="table-wrapper">
        <h2>Detection Log</h2>
        <table>
            <thead>
                <tr>
                    <th>Thumbnail</th>
                    <th>Plate Number</th>
                    <th>Camera</th>
                    <th>Date &amp; Time</th>
                    <th>Confidence</th>
                </tr>
            </thead>
            <tbody id="det-body">
                <tr><td colspan="5" class="no-data">Loading…</td></tr>
            </tbody>
        </table>
    </div>

</div>

<footer>LPR System — Raspberry Pi 5 &middot; YOLOv8 Plate Detector + EasyOCR</footer>

<!-- ====== JavaScript ====== -->
<script>
    const tbody = document.getElementById('det-body');
    const dateInput = document.getElementById('date-filter');

    // ---- Load available video devices and populate selectors ----
    async function loadDevices() {
        try {
            const res = await fetch('/api/devices');
            const data = await res.json();
            const devices = data.devices;
            const assignments = data.assignments;

            ['entrance', 'exit'].forEach(cam => {
                const sel = document.getElementById('dev-' + cam);
                const currentVal = sel.value;
                sel.innerHTML = '';

                // Always add a "not assigned" option
                const noneOpt = document.createElement('option');
                noneOpt.value = '';
                noneOpt.textContent = '— not assigned —';
                sel.appendChild(noneOpt);

                if (!devices.length) return;

                devices.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.index;
                    let label = d.name + ' (/dev/video' + d.index + ')';
                    if (d.in_use_by) label += ' [' + d.in_use_by + ']';
                    opt.textContent = label;
                    if (assignments[cam] === d.index) opt.selected = true;
                    sel.appendChild(opt);
                });
            });
            return devices.length;
        } catch (e) {
            console.error('Devices error:', e);
            return 0;
        }
    }

    // ---- Scan for cameras (with loading feedback) ----
    async function scanDevices() {
        const statusEl = document.getElementById('status-scan');
        statusEl.textContent = 'Scanning…';
        statusEl.className = 'assign-status';
        const count = await loadDevices();
        if (count > 0) {
            statusEl.textContent = '✓ Found ' + count + ' device(s)';
            statusEl.className = 'assign-status assign-ok';
        } else {
            statusEl.textContent = '✗ No devices found';
            statusEl.className = 'assign-status assign-fail';
        }
        setTimeout(() => { statusEl.textContent = ''; }, 5000);
    }

    // ---- Assign a camera to a selected device ----
    async function assignDevice(cameraName) {
        const sel = document.getElementById('dev-' + cameraName);
        const statusEl = document.getElementById('status-' + cameraName);
        const deviceIndex = parseInt(sel.value, 10);
        if (isNaN(deviceIndex)) {
            statusEl.textContent = '✗ Select a device first';
            statusEl.className = 'assign-status assign-fail';
            setTimeout(() => { statusEl.textContent = ''; }, 3000);
            return;
        }

        statusEl.textContent = 'Starting…';
        statusEl.className = 'assign-status';

        try {
            const res = await fetch('/api/assign_camera', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({camera: cameraName, device_index: deviceIndex}),
            });
            const data = await res.json();
            if (data.ok) {
                statusEl.textContent = '✓ Running';
                statusEl.className = 'assign-status assign-ok';
            } else {
                statusEl.textContent = '✗ ' + (data.error || 'Failed');
                statusEl.className = 'assign-status assign-fail';
            }
        } catch (e) {
            statusEl.textContent = '✗ Error';
            statusEl.className = 'assign-status assign-fail';
        }
        setTimeout(() => { statusEl.textContent = ''; }, 4000);
    }

    // ---- Stop a running camera ----
    async function stopDevice(cameraName) {
        const statusEl = document.getElementById('status-' + cameraName);
        statusEl.textContent = 'Stopping…';
        statusEl.className = 'assign-status';

        try {
            const res = await fetch('/api/stop_camera', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({camera: cameraName}),
            });
            const data = await res.json();
            if (data.ok) {
                statusEl.textContent = '✓ Stopped';
                statusEl.className = 'assign-status assign-ok';
            } else {
                statusEl.textContent = 'Not running';
                statusEl.className = 'assign-status assign-fail';
            }
        } catch (e) {
            statusEl.textContent = '✗ Error';
            statusEl.className = 'assign-status assign-fail';
        }
        setTimeout(() => { statusEl.textContent = ''; }, 4000);
        // Refresh device list since it's now free
        loadDevices();
    }

    // ---- Fetch & render stats ----
    async function loadStats() {
        try {
            const res = await fetch('/api/stats');
            const s = await res.json();
            document.getElementById('stat-total').textContent = s.total;
            document.getElementById('stat-today').textContent = s.today;
            document.getElementById('stat-entrance').textContent = s.entrance;
            document.getElementById('stat-exit').textContent = s.exit;
        } catch (e) {
            console.error('Stats error:', e);
        }
    }

    // ---- Fetch & render detections table ----
    async function loadDetections(dateStr) {
        try {
            let url = '/api/detections';
            if (dateStr) url += '?date=' + encodeURIComponent(dateStr);
            const res = await fetch(url);
            const rows = await res.json();

            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-data">No detections found.</td></tr>';
                return;
            }

            tbody.innerHTML = rows.map(r => {
                const thumb = r.image_url
                    ? `<img class="thumb" src="${r.image_url}" alt="${r.plate_number}" onerror="this.style.display='none'">`
                    : '<span class="no-thumb">N/A</span>';

                return `
                <tr>
                    <td>${thumb}</td>
                    <td><strong>${r.plate_number}</strong></td>
                    <td><span class="badge ${r.camera}">${r.camera}</span></td>
                    <td>${r.timestamp}</td>
                    <td class="confidence">${(r.confidence * 100).toFixed(1)}%</td>
                </tr>
                `;
            }).join('');
        } catch (e) {
            console.error('Detections error:', e);
            tbody.innerHTML = '<tr><td colspan="5" class="no-data">Error loading data.</td></tr>';
        }
    }

    function applyFilter() {
        const d = dateInput.value;
        if (d) loadDetections(d);
    }

    function clearFilter() {
        dateInput.value = '';
        loadDetections();
    }

    // ---- Initial load + auto-refresh ----
    loadDevices();
    loadStats();
    loadDetections();
    setInterval(() => { loadStats(); loadDetections(dateInput.value || null); }, 5000);
</script>

</body>
</html>
